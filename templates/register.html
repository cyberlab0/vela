<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VELA - Register</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .auth-form .input-group input, .auth-form .input-group select {
            width: 100%;
            padding: 1rem;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(0, 0, 0, 0.3);
            color: white;
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }
        .auth-form .input-group input:focus, .auth-form .input-group select:focus {
            border-color: var(--color-info);
            outline: none;
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.4);
        }
        
        #particles-js {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
        }
        
        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 0.8rem;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: rgba(255,255,255,0.05);
            color: white;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            margin-bottom: 0.8rem;
            transition: all 0.3s;
        }
        .social-btn:hover {
            background: rgba(255,255,255,0.1);
            transform: translateY(-2px);
        }
        
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 1.5rem 0;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--border-color);
        }
        .divider:not(:empty)::before { margin-right: .25em; }
        .divider:not(:empty)::after { margin-left: .25em; }
        
        .profile-upload-container {
            display: flex;
            justify-content: center;
            margin-bottom: 2rem;
        }
        
        .profile-upload-circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: rgba(0,0,0,0.4);
            border: 2px dashed rgba(255,255,255,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        
        .profile-upload-circle:hover {
            border-color: #60a5fa;
            background: rgba(96, 165, 250, 0.1);
        }
        
        .profile-upload-circle i {
            font-size: 2rem;
            color: rgba(255,255,255,0.5);
            transition: all 0.3s ease;
        }
        
        .profile-upload-circle:hover i {
            color: #60a5fa;
            transform: scale(1.1);
        }
        
        #profile-preview {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            display: none;
        }
        
        #profile_image {
            display: none;
        }
    </style>
</head>
<body class="auth-body">
    <div id="particles-js"></div>
    <div class="auth-container glass-panel page-transition" style="max-width: 500px;">
        <div class="logo-container animate-pulse-glow">
            <h1 class="vela-logo-text" style="font-size: 3.5rem; text-shadow: 0 0 20px rgba(59, 130, 246, 0.5);">VELA</h1>
        </div>
        <p class="subtitle">Create Your Global Account</p>
        
        {% if error %}
            <div class="error-msg" style="color: #ef4444; margin-bottom: 1rem; font-weight: 500; text-align: center;">{{ error }}</div>
        {% endif %}
        
        <form method="POST" action="{{ url_for('register') }}" enctype="multipart/form-data" class="auth-form">
            
            <div class="profile-upload-container" style="flex-direction: column; align-items: center; margin-bottom: 2rem;">
                <label for="profile_image" class="profile-upload-circle" id="upload-label">
                    <i class="fas fa-camera"></i>
                    <img id="profile-preview" src="#" alt="Preview">
                </label>
                <input type="file" id="profile_image" name="profile_image" accept="image/*">
                
                <p style="color: #a1a1aa; font-size: 0.9em; margin: 1rem 0 0.5rem;">Or choose an avatar:</p>
                <div style="display: flex; gap: 10px; justify-content: center;">
                    <label class="avatar-option">
                        <input type="radio" name="avatar_selection" value="avatars/avatar1.svg" style="display:none;" id="av1">
                        <img src="{{ url_for('static', filename='avatars/avatar1.svg') }}" style="width: 40px; height: 40px; border-radius: 50%; cursor: pointer;" onclick="selectAvatar('av1', this.src)">
                    </label>
                    <label class="avatar-option">
                        <input type="radio" name="avatar_selection" value="avatars/avatar2.svg" style="display:none;" id="av2">
                        <img src="{{ url_for('static', filename='avatars/avatar2.svg') }}" style="width: 40px; height: 40px; border-radius: 50%; cursor: pointer;" onclick="selectAvatar('av2', this.src)">
                    </label>
                    <label class="avatar-option">
                        <input type="radio" name="avatar_selection" value="avatars/avatar3.svg" style="display:none;" id="av3">
                        <img src="{{ url_for('static', filename='avatars/avatar3.svg') }}" style="width: 40px; height: 40px; border-radius: 50%; cursor: pointer;" onclick="selectAvatar('av3', this.src)">
                    </label>
                    <label class="avatar-option">
                        <input type="radio" name="avatar_selection" value="avatars/avatar4.svg" style="display:none;" id="av4">
                        <img src="{{ url_for('static', filename='avatars/avatar4.svg') }}" style="width: 40px; height: 40px; border-radius: 50%; cursor: pointer;" onclick="selectAvatar('av4', this.src)">
                    </label>
                </div>
            </div>

            <div class="input-group">
                <input type="text" name="name" placeholder="Full Name" required>
            </div>
            <div class="input-group">
                <input type="email" name="email" placeholder="Email Address" required>
            </div>
            <div class="input-group">
                <input type="text" name="phone_number" placeholder="WhatsApp Number (e.g. +1234567890)" required>
            </div>
            <div class="input-group">
                <select name="country" required>
                    <option value="" disabled selected>Select Your Country</option>
                    {% for country in countries %}
                        <option value="{{ country }}">{{ country }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="input-group">
                <label style="color: #a1a1aa; font-size: 0.8rem;">Preferred Dashboard Language</label>
                <select name="preferred_language" required>
                    <option value="en">English</option>
                    <option value="es">Spanish</option>
                    <option value="fr">French</option>
                    <option value="de">German</option>
                    <option value="pt">Portuguese</option>
                    <option value="ru">Russian</option>
                    <option value="ar">Arabic</option>
                    <option value="hi">Hindi</option>
                    <option value="zh-CN">Chinese (Simplified)</option>
                    <option value="ja">Japanese</option>
                    <option value="ko">Korean</option>
                    <option value="ig">Igbo</option>
                    <option value="ha">Hausa</option>
                    <option value="yo">Yoruba</option>
                </select>
            </div>

            <div class="input-group">
                <input type="password" name="password" placeholder="Secure Password" required>
            </div>
            <button type="submit" class="primary-btn hover-lift ripple-glow" style="width: 100%; margin-top: 1rem;">Create Account</button>
        </form>
        
        <div class="divider">OR</div>
        
        <a href="{{ url_for('google_login') }}" style="text-decoration: none;">
            <button type="button" class="social-btn">
                <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" width="20" alt="Google">
                Continue with Google
            </button>
        </a>
        
        <form method="POST" action="{{ url_for('login') }}">
            <input type="hidden" name="email" value="apple_auth@vela.io">
            <input type="hidden" name="password" value="apple_mock">
            <input type="hidden" name="is_oauth" value="true">
            <button type="submit" class="social-btn">
                <i class="fab fa-apple" style="font-size: 1.2rem;"></i>
                Continue with Apple
            </button>
        </form>

        <p style="margin-top: 1.5rem; color: #a1a1aa; text-align: center;">Already have an account? <a href="{{ url_for('login') }}" style="color: var(--color-info); text-decoration: none;">Login</a></p>
    </div>

        <script>
        // Profile Image Preview Logic
        const profileInput = document.getElementById('profile_image');
        const profilePreview = document.getElementById('profile-preview');
        const cameraIcon = document.querySelector('.profile-upload-circle i');

        profileInput.addEventListener('change', function() {
            if (this.files && this.files[0]) {
                const reader = new FileReader();
                
                reader.onload = function(e) {
                    profilePreview.src = e.target.result;
                    profilePreview.style.display = 'block';
                    cameraIcon.style.display = 'none';
                    // Uncheck all avatars if file selected
                    document.querySelectorAll('input[name="avatar_selection"]').forEach(el => el.checked = false);
                    document.querySelectorAll('.avatar-option img').forEach(el => el.style.border = 'none');
                }
                
                reader.readAsDataURL(this.files[0]);
            }
        });
        
        function selectAvatar(id, src) {
            // Uncheck file input
            profileInput.value = "";
            profilePreview.src = src;
            profilePreview.style.display = 'block';
            cameraIcon.style.display = 'none';
            
            // Highlight selected avatar
            document.querySelectorAll('.avatar-option img').forEach(el => el.style.border = 'none');
            document.getElementById(id).nextElementSibling.style.border = '2px solid #60a5fa';
            document.getElementById(id).checked = true;
        }
    </script>

<!-- Google Translate Widget -->
<div id='google_translate_element' style='display:none;'></div>
<script type='text/javascript'>
function googleTranslateElementInit() {
  new google.translate.TranslateElement({pageLanguage: 'en', autoDisplay: false}, 'google_translate_element');
}
</script>
<script type='text/javascript' src='//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit'></script>
<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
<script>
    particlesJS.load('particles-js', "{{ url_for('static', filename='particles.json') }}", function() {
        console.log('particles.js loaded');
    });
</script>
</body>

</html>
